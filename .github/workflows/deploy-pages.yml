name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_ingest:
        description: Run ingest before build
        required: false
        type: boolean
        default: false
      limit:
        description: Max new posts to ingest for this run
        required: false
        type: string
        default: '10'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SITE_URL: ${{ vars.SITE_URL || format('https://{0}.github.io', github.repository_owner) }}
      BASE_URL: ${{ vars.BASE_URL || format('/{0}/', github.event.repository.name) }}
      LIMIT: ${{ github.event.inputs.limit || '10' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Optional ingest (manual dispatch)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_ingest == 'true'
        run: npm run ingest -- --limit "$LIMIT"

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
