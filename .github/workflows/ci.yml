name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Ingest dry-run sanity check
        run: |
          set -e
          for attempt in 1 2 3; do
            if npm run ingest:dry -- --limit 3; then
              exit 0
            fi

            if [ "$attempt" -lt 3 ]; then
              echo "Retrying ingest dry-run in 10s..."
              sleep 10
            fi
          done

          echo "Ingest dry-run failed after 3 attempts."
          exit 1
